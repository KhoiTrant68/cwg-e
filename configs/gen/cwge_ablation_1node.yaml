logging:
  use_wandb: true
  log_every_k: 10

dataset:
  resolution: 256
  use_aug: false
  use_latent: true
  use_cache: true
  num_classes: 1000
  batch_size: 1024
  eval_batch_size: 2048
  kwargs:
    num_workers: 8
    pin_memory: true
    prefetch_factor: 2

model:
  cond_dim: 768
  input_size: 32
  in_channels: 4
  patch_size: 2

  hidden_size: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  out_channels: 4

  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  n_cls_tokens: 16
  noise_classes: 64
  noise_coords: 32
  use_bf16: true
  attn_fp32: true

optimizer:
  lr_schedule:
    learning_rate: 0.0002
    warmup_steps: 5000
    lr_schedule: "const"
    total_steps: 100000
  weight_decay: 0.01
  adam_b1: 0.9
  adam_b2: 0.95

train:
  diverse_noise: true
  train_batch_size: 64
  seed: 42
  total_steps: 30000
  save_per_step: 2000
  keep_every: 10000
  eval_per_step: 5000
  pos_per_sample: 64
  neg_per_sample: 16
  positive_bank_size: 128
  negative_bank_size: 1000
  forward_dict:
    gen_per_label: 64
    cfg_min: 1.0
    cfg_max: 4.0
    neg_cfg_pw: 3.0
  activation_kwargs:
    patch_mean_size: [2, 4]
    patch_std_size: [2, 4]
    use_std: true
    use_mean: true
    every_k_block: 2
  loss_kwargs:
    R_list: [0.05]
  cfg_list: [1.0, 1.5, 2.0, 2.5, 3.0, 3.5]
  ema_decay: 0.999
  push_per_step: 64
  grad_accum_steps: 4

  # --- OT loss config ---
  ot_mode: "debiased"
  ot_kwargs:
    sinkhorn_num_iter: 10
    use_new_cfg: true
    disable_diag_mask: true
    resample_neg: true
    batch_sinkhorn: false        # bypassed when cluster_mode != "none"
    use_quadratic_cost: true

    # --- CWG-E additions ---
    # Set cluster_mode: "none" to reproduce W-Flow exactly (bit-for-bit ablation arm).
    cluster_mode: "hard"          # "none" | "hard" | "soft"
    n_clusters: 8
    mask_lambda: 1.0              # only used by "soft"

    # Per-cluster Sinkhorn: K small batched OT problems instead of one N×N.
    # Recommended TRUE; collapses without outer Γ on unstable training.
    use_per_cluster_sinkhorn: true

    # Outer Γ centroid coupling: restores "V → 0 iff q=p" (Thm B.2).
    # Without this, cluster-only drift has a spurious-equilibrium set
    # parameterised by mismatched cluster masses (Cor B.3 in docs/theory.md).
    use_outer_gamma: true
    outer_gamma_eps: 0.01         # sharper => β closer to 1 at q=p
    outer_gamma_iter: 200         # needed at small eps for convergence

    # cluster_pos:  true  => both T_pq and T_qneg are clustered (validated 2D)
    #               false => T_pq stays global (coverage signal),
    #                        T_qneg clustered+outer-Γ (repulsion). Use this
    #                        if you see Gate-2 style collapse in training.
    cluster_pos: true

    # --- Sticky population statistics (cluster_stats.py) ---
    # Centroids and pool marginal precomputed once from the positive memory
    # bank at warmup, then frozen (sticky_refresh_steps = 0) or refreshed
    # on a cadence to track slow drift.
    #
    # Distributed (DDP) is fully supported: each rank builds a partial pool
    # of size max_pool_tokens/world from a disjoint class range; refresh()
    # all-gathers into one global pool of ``max_pool_tokens`` and broadcasts
    # bitwise-identical centroids from rank 0 to all ranks.
    sticky_warmup_steps: 200      # wait for memory bank to fill
    sticky_refresh_steps: 0       # 0 = frozen after first compute; >0 = re-cluster cadence (steps)
    sticky_samples_per_class: 4   # bank samples per class for the feature pool
    sticky_max_pool_tokens: 200000  # GLOBAL pool size cap (per-rank = this / world)
    sticky_extract_chunk: 256     # MAE forward batch during refresh — lower if OOM
    sticky_kmeans_iter: 30        # iters for first (cold) k-means
    sticky_kmeans_iter_warm: 10   # iters for subsequent (warm-started) refreshes
    # sticky_feature_key: null    # null => auto-resolve first feature head

feature:
  mae_path: "hf://mae_latent_256"
  use_mae: true
  use_convnext: false
